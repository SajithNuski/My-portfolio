<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="g1" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#092025" />
      <stop offset="60%" stop-color="#07121a" />
      <stop offset="100%" stop-color="#041018" />
    </radialGradient>
    <linearGradient id="g2" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="16" fill="#07121a" />
  <rect x="4" y="4" width="88" height="88" rx="14" fill="url(#g1)" />

  <!-- outer ring dots -->
  <g fill="#0ee08a" opacity="0.92">
    <circle cx="24" cy="20" r="2.4" fill="#05d37a"/>
    <circle cx="72" cy="18" r="2.4" fill="#06c96e"/>
    <circle cx="80" cy="56" r="2.4" fill="#00ff9a"/>
    <circle cx="70" cy="78" r="2.4" fill="#06d57a"/>
    <circle cx="26" cy="76" r="2.4" fill="#0df29d"/>
    <circle cx="12" cy="48" r="2.4" fill="#06d57a"/>
  </g>

  <!-- concentric rings -->
  <g stroke="url(#g2)" stroke-width="1.2" fill="none" opacity="0.55">
    <circle cx="48" cy="48" r="26" />
    <circle cx="48" cy="48" r="18" opacity="0.65" />
    <circle cx="48" cy="48" r="9" opacity="0.85" />
  </g>

  <!-- central badge -->
  <circle cx="48" cy="48" r="12" fill="#06231a" stroke="#0ee08a" stroke-width="1.6" />
  <text x="48" y="52" font-family="Syne, Inter, Arial, sans-serif" font-weight="700" font-size="10.5" fill="#bfffdc" text-anchor="middle">SN</text>
</svg>